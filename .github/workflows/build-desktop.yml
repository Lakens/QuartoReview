name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'electron/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'build_win.bat'
      - 'build_mac.bat'
      - 'build_mac.sh'
      - 'install.bat'
      - 'install.sh'
      - 'scripts/**'
      - 'start.bat'
      - 'start.sh'
      - '.gitattributes'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'electron/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'build_win.bat'
      - 'build_mac.bat'
      - 'build_mac.sh'
      - 'install.bat'
      - 'install.sh'
      - 'scripts/**'
      - 'start.bat'
      - 'start.sh'
      - '.gitattributes'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run backend smoke test
        run: npm test
        working-directory: backend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build Windows installer
        run: npm run build:win
        working-directory: electron

      - name: Smoke test packaged Windows app
        run: node scripts/electron-smoke.mjs "dist/win-unpacked/QuartoReview.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarto-review-windows-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Run backend smoke test
        run: npm test
        working-directory: backend

      - name: Install Electron dependencies
        run: npm ci
        working-directory: electron

      - name: Build macOS app
        run: npm run build:mac
        working-directory: electron

      - name: Smoke test packaged macOS app
        shell: bash
        run: |
          APP_PATH="$(find dist -path '*QuartoReview.app/Contents/MacOS/QuartoReview' | head -n 1)"
          test -n "$APP_PATH"
          node scripts/electron-smoke.mjs "$APP_PATH"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarto-review-macos-${{ github.sha }}
          path: |
            dist/**/*.dmg
            dist/**/*.zip
          if-no-files-found: error
